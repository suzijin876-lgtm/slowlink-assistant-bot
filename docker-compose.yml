services:
  assistant_bot:
    build: .
    container_name: slowlink_assistant_bot
    restart: always
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import assistant_bot; print(assistant_bot.__version__)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test
        run: |
          python -m unittest discover -s tests
          python -m compileall -q assistant_bot tests
          bash -n install.sh manage.sh uninstall.sh ops/slowlink_assistant_watchdog.sh
          dash -n install.sh manage.sh uninstall.sh ops/slowlink_assistant_watchdog.sh

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          file_version="${version//./_}"
          test "$(cat VERSION)" = "$version"
          mkdir -p dist
          zip -qr "dist/slowlink_assistant_bot_app_v${file_version}.zip" assistant_bot \
            -x '*/__pycache__/*' '*.pyc'
          zip -qr "dist/slowlink_assistant_bot_v${file_version}_full.zip" \
            .dockerignore .env.example .gitattributes .gitignore CHANGELOG.md \
            Dockerfile README.md VERSION assistant_bot deploy docker-compose.yml \
            docs/FEATURES.md docs/OPERATIONS.md docs/VERSION_ARCHIVE.md \
            install.sh manage.sh uninstall.sh ops requirements.txt \
            -x '*/__pycache__/*' '*.pyc'
          python - "$version" "dist/slowlink_assistant_bot_v${file_version}_update_log.txt" <<'PY'
          import sys
          from pathlib import Path

          version, output = sys.argv[1:]
          text = Path("CHANGELOG.md").read_text(encoding="utf-8")
          marker = f"## [{version}]"
          start = text.find(marker)
          if start < 0:
              raise SystemExit(f"CHANGELOG missing {marker}")
          end = text.find("\n## [", start + len(marker))
          section = text[start:] if end < 0 else text[start:end]
          Path(output).write_text(section.strip() + "\n", encoding="utf-8")
          PY
          (
            cd dist
            sha256sum *.zip *_update_log.txt > SHA256SUMS.txt
            sha256sum -c SHA256SUMS.txt
          )

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --verify-tag \
            --title "SlowLink Assistant Bot $GITHUB_REF_NAME" \
            --generate-notes
